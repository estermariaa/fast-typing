<!DOCTYPE html>
<html>

<head> 
    <title>Fast Typing</title>    
    <link rel="shortcut icon" href="keyboard.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="top-bar">
        <div class="logo">
            <span id="logo">⌨️ Fast Typing</span>
        </div>
        <!-- Menu de navegação -->
        <nav>
            <button id="button-home">Início</button>
            <button id="button-ranking">Ranking</button>
        </nav>
    </header>
     
    <!-- Corpo principal -->
    <main id="game-container">

        <section id="screen-setup">
            <div class="setup-toolbar">
                <div class="level-selector">
                    <button class="level-button" data-level="facil">Fácil</button>
                    <button class="level-button active" data-level="medio">Médio</button>
                    <button class="level-button" data-level="dificil">Difícil</button>
                </div>

                <div class="separator">|</div>

                <div class="time-selector">
                    <button class="time-button" data-time="15">15s</button>    
                    <button class="time-button active" data-time="30">30s</button>
                    <button class="time-button" data-time="60">60s</button>
                </div>
            </div>

            <h2>Bem-vindo!</h2>
            <input type="text" id="player-name" placeholder="Digite seu nome...">
            <p>Escolha a dificuldade no menu abaixo e clique em Iniciar.</p>
            <button id="start-game-button">Iniciar</button>
        </section>

        <section id="screen-game" class="hidden">
            <div class="stats-container">
                <div id="timer-display">Tempo: 00s</div>
                <div id="error-display">Erros: 0</div>
            </div>
            <div id="words-display">
                </div>
            <input type="text" id="typing-input" autocomplete="off">
            <button id="restart-button">
                <img src="Images/Restart.png" alt="Reiniciar" id="restart-icon">
            </button>
        </section>

        <section id="screen-ranking" class="hidden">
            <h2>🏆 Ranking Geral</h2>
            <ul id="ranking-list"></ul>
        </section>

    </main>

    <!-- Rodapé -->
    <footer id="config-bar">
        <p>Produzido por Ester Maria, Lucas Campelo, Mateus Brito</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
