<!DOCTYPE html>
<html>

<head> 
    <title>Fast Typing</title>    
    <link rel="shortcut icon" href="keyboard.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="top-bar">
        <div class="logo">
            <span id="logo">⌨️ Fast Typing</span>
        </div>
        <!-- Menu de navegação -->
        <nav>
            <button id="button-ranking">Ranking</button>
            <button id="button-home">Início</button>
        </nav>
    </header>
     
    <!-- Corpo principal -->
    <main id="game-container">
        
        <section id="screen-setup">
            <h2>Bem-vindo!</h2>
            <input type="text" id="player-name" placeholder="Digite seu nome para começar...">
            <p>Escolha a dificuldade no menu abaixo e clique em Iniciar.</p>
            <button id="start-game-button">Iniciar</button>
        </section>

        <section id="screen-game" class="hidden">
            <div id="timer-display">Tempo: 00s</div>
            <div id="words-display">
                </div>
            <input type="text" id="typing-input" autocomplete="off">
        </section>

        <section id="screen-ranking" class="hidden">
            <h2>🏆 Ranking Geral</h2>
            <ul id="ranking-list">
                </ul>
        </section>

    </main>

    <!-- Rodapé -->
    <footer id="config-bar">
        <div class="level-selector">
            <span class="label">Dificuldade</span>
            <div class="options">
                <button class="level-button" data-level="facil">Fácil</button>
                <button class="level-button active" data-level="medio">Médio</button>
                <button class="level-button" data-level="dificil">Difícil</button>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
