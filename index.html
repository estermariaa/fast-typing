<!DOCTYPE html>
<html>

<head> 
    <title>Fast Typing</title>    
    <link rel="shortcut icon" href="Images/keyboard.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
</head>

<body>
    <header id="top-bar">
        <div class="logo">
            <span id="logo">⌨️ Fast Typing</span>
        </div>
        <!-- Menu de navegação -->
        <nav>
            <button id="button-home">Início</button>
            <button id="button-ranking">Ranking</button>
        </nav>
    </header>
     
    <!-- Corpo principal -->
    <main id="game-container">

        <section id="screen-setup">
            <div class="setup-toolbar">
                <div class="level-selector">
                    <button class="level-button" data-level="facil">Fácil</button>
                    <button class="level-button active" data-level="medio">Médio</button>
                    <button class="level-button" data-level="dificil">Difícil</button>
                </div>

                <div class="separator">|</div>

                <div class="time-selector">
                    <button class="time-button" data-time="15">15s</button>    
                    <button class="time-button active" data-time="30">30s</button>
                    <button class="time-button" data-time="60">60s</button>
                </div>
            </div>

            <h2>Bem-vindo(a)!</h2>

            <div class="input-group">
                <label for="player-name">Nome:</label>
                <input type="text" id="player-name" placeholder="Digite seu nome...">
            </div>

            <p>Escolha a dificuldade no menu acima e clique em Iniciar.</p>            

            <button id="start-game-button">Iniciar</button>

        </section>

        <section id="screen-game" class="hidden">
            <div class="stats-container">
                <div id="timer-display">Tempo: 00s</div>
                <div id="error-display">Erros: 0</div>
            </div>
            <div id="words-display">
                </div>
            <input type="text" id="typing-input" autocomplete="off">
            <button id="restart-button">
                <img src="Images/Restart.png" alt="Reiniciar" id="restart-icon">
            </button>
        </section>

        <section id="screen-ranking" class="hidden">
            <div class="ranking-layout">
                <!-- Painel lateral -->
                <aside class="ranking-sidebar">
                    <div class="filter-group">
                        <p class="filter-label">Dificuldade</p>
                        <button class="filter-btn active" data-filter-level="geral">Geral</button>
                        <button class="filter-btn" data-filter-level="facil">Fácil</button>
                        <button class="filter-btn" data-filter-level="medio">Médio</button>
                        <button class="filter-btn" data-filter-level="dificil">Difícil</button>
                    </div>

                    <div class="filter-group">
                        <p class="filter-label">Tempo</p>
                        <button class="filter-btn active" data-filter-time="geral">Geral</button>
                        <button class="filter-btn" data-filter-time="15">15s</button>
                        <button class="filter-btn" data-filter-time="30">30s</button>
                        <button class="filter-btn" data-filter-time="60">60s</button>
                    </div>
                </aside>

                <!-- Tabela de ranking -->
                <div class="ranking-content">
                    <h2>🏆 Ranking</h2>
                    <ul id="ranking-list"></ul>
                </div>
            </div>
        </section>
    </main>

    <!-- Rodapé -->
    <footer id="config-bar">
        <div class="footer-box">
            <img src="Images/logo_github.png" alt="GitHub Logo" class="footer-github-icon">
            <p>Produzido por: 
                <a href="https://github.com/estermariaa" target="_blank" class="author-link">Ester Maria</a> |
                <a href="https://github.com/zcampelo" target="_blank" class="author-link">Lucas Campelo</a> |
                <a href="https://github.com/MateusoBrito" target="_blank" class="author-link">Mateus Brito</a>
            </p>
        </div>
        <button id="theme-toggle">Dark ☾</button>
    </footer>

    <script src="script.js"></script>

</body>

</html>
